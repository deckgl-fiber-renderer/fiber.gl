schema: spec-driven

context: |
  Domain: React custom renderer for Deck.gl - declarative, component-based geospatial visualization

  Monorepo: @deckgl-fiber-renderer/* packages managed with Turborepo + pnpm workspaces + Changesets
  - packages/dom: Main user-facing package, React bindings for Deck.gl rendering
  - packages/reconciler: Core React reconciler implementation
  - packages/shared: Shared utilities, constants, and store logic
  - packages/types: TypeScript type definitions and JSX typings

  Stack:
  - TypeScript 6.0.2 (ES2023 target, ESNext modules, strict mode)
  - React 19 (peer dependency)
  - Deck.gl 9.1+ (peer dependency for layers and core)
  - react-reconciler 0.31.0 (custom renderer foundation)
  - Vitest 4.1.1 (testing)
  - oxlint 1.57+ / oxfmt 0.41+ (lint/format)
  - tsdown 0.21+ (build)
  - Turborepo 2.8+ (orchestration)

  Patterns:
  - Functional programming style (prefer pure functions, avoid classes)
  - Custom React renderer architecture using react-reconciler
  - ESM-only (no CommonJS)
  - Workspace protocol for internal dependencies (workspace:*)
  - Type guards for runtime type checking (isDefined, isFn)
  - Declarative component API (layers as JSX elements)

  Reconciler Architecture (persistence mode):
  - Operates in persistence mode: creates new instances on every change (not mutation mode)
  - Aligns with Deck.gl philosophy: "layers are descriptor objects that are very cheap to instantiate"
  - Deck.gl matches layers by ID for efficient diffing - stable IDs are CRITICAL
  - Missing or duplicate layer IDs cause expensive reinitialization and silent bugs
  - Single <layer> element pattern: <layer layer={new LayerClass({ id: 'stable-id', ... })} />
  - TypeScript generics preserved through layer constructors (not JSX.IntrinsicElements)
  - Development-mode validation: missing IDs, duplicate IDs, host context tracking
  - Suspense support via hidden instance cloning (delegates to Deck.gl visible prop)
  - Refs expose actual Layer/View instances (not internal wrappers)
  - Host context tracking for View nesting validation

  Standards:
  - Strict TypeScript: noUncheckedIndexedAccess, noImplicitOverride, verbatimModuleSyntax
  - Type-safe exports with explicit .d.ts declarations
  - sideEffects: false (except reconciler and types which are true; planned for deprecation in v2/v3)
  - Semver versioning

  Build:
  - GitHub Actions CI/CD with Turbo caching
  - Node 22+, pnpm 10+
  - Changesets for version management and changelogs
  - All packages publicly scoped to @deckgl-fiber-renderer on npm

  Key References:
  - Archived changes: openspec/changes/archive/2026-03-24-reconciler-correctness-improvements
  - Archived changes: openspec/changes/archive/2026-03-24-single-layer-element
  - React Reconciler: github.com/facebook/react/tree/main/packages/react-reconciler
  - React Native Fabric (reference implementation): github.com/facebook/react/blob/main/packages/react-native-renderer/src/ReactFiberConfigFabric.js
  - Deck.gl Layer Lifecycle: deck.gl/docs/developer-guide/custom-layers/layer-lifecycle

rules:
  proposal:
    - Identify which @deckgl-fiber-renderer/* packages are affected
    - Consider React 19 and Deck.gl 9.1+ compatibility implications
    - Assess impact on declarative JSX API surface
    - Flag breaking changes that require major version bump per Semver
    - Verify reconciler persistence mode semantics are maintained
    - Ensure layer ID requirements and validation are preserved
    - Consider impact on TypeScript generic type inference

  specs:
    - Use Given/When/Then format for behavior scenarios
    - Include examples with JSX component usage where applicable
    - Reference Deck.gl layer types and props when specifying layer behavior
    - Check openspec/specs/ for existing patterns before creating new ones
    - Include layer ID in all examples (critical for reconciler correctness)
    - Specify validation behavior in development mode where applicable
    - Reference archived changes (reconciler-correctness-improvements, single-layer-element) for patterns

  design:
    - Document reconciler impacts for any changes to renderer lifecycle
    - Consider browser/SSR environments (packages/dom uses client-only)
    - Specify TypeScript type exports and JSX namespace changes
    - Address workspace dependency graph (shared, types <- reconciler <- dom)
    - Respect persistence mode: new instances on change, no mutation of existing nodes
    - Validate layer ID handling: must preserve IDs through reconciliation for Deck.gl diffing
    - Add development-mode validation where runtime errors are preventable
    - Document React lifecycle patterns: updateTriggers, visible prop, conditional rendering
    - Consider host context propagation for validation and error messages
    - Link to React reconciler source and React Native Fabric reference implementations

  tasks:
    - Break into max 2-hour independent chunks
    - Each task must be testable with Vitest
    - Include Ultracite lint/format check in implementation tasks
    - Tag tasks that require changeset generation

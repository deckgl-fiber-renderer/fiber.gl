  "@types/react-reconciler": 0.31.0

  # Deck.gl
  "@deck.gl/core": ">=9.1"
  "@deck.gl/extensions": ">=9.1"
  "@deck.gl/geo-layers": ">=9.1"
  "@deck.gl/layers": ">=9.1"
  "@deck.gl/mapbox": ">=9.1"
  "@deck.gl/mesh-layers": ">=9.1"
  "@deck.gl/widgets": ">=9.1"

  # Maplibre
  maplibre-gl: ^5

  # Misc
  zustand: ^5
  loglayer: ^9
  jsdom: ^29

  # Build Tools
  typescript: ^6.0.2
  tsdown: ^0.21.4
  vitest: ^4.1.1

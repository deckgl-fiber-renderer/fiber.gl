name: Test Matrix (React 18 & 19)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-matrix:
    name: Test React ${{ matrix.react-version }} + Reconciler ${{ matrix.react-reconciler-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        react-version: ["18.3.1", "19.0.0"]
        react-reconciler-version: ["0.29.2", "0.30.0"]
        exclude:
          # React 18 is incompatible with react-reconciler 0.30
          - react-version: "18.3.1"
            react-reconciler-version: "0.30.0"
          # React 19 is incompatible with react-reconciler 0.29
          - react-version: "19.0.0"
            react-reconciler-version: "0.29.2"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Override React versions
        run: |
          pnpm add -D react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }}
          pnpm add -D react-reconciler@${{ matrix.react-reconciler-version }}

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm exec tsc --noEmit
